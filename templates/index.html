<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scann Pro - Full Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    <script src="https://unpkg.com/axios@1.6.8/dist/axios.min.js"></script>
    <style>
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        body { background-color: #f0f2f5; font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
        .btn-primary { background: #2563eb; color: white; transition: all 0.2s; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/search-viz.js"></script>
    <script src="/static/js/cell-compare.js"></script>
    <script src="/static/js/benchmark-viz.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="/static/js/pdf-export.js"></script>
    <script src="/static/js/export-utils.js"></script>
    <!-- classic JSX：避免 Babel automatic runtime 注入 import 导致白屏 -->
    <script type="text/babel" data-presets="react" data-presets-options='{"react":{"runtime":"classic","pragma":"React.createElement","pragmaFrag":"React.Fragment"}}'>
        const { useState, useEffect, useMemo } = React;

        const ROLE_LABELS = {
            visitor: '访客', normal: '普通用户', expert: '资深专家',
            labadmin: '实验室管理员', sysadmin: '系统管理员'
        };

        const INDEX_TYPES = [
            { type: 'hnsw',     label: 'HNSW',     lib: 'hnswlib', desc: '图结构 ANN，速度与精度平衡',
              btn: 'bg-gradient-to-br from-slate-700 to-slate-900 border-slate-600 text-white shadow-md shadow-slate-900/30 hover:shadow-lg hover:shadow-slate-900/40' },
            { type: 'exact',    label: 'Exact',    lib: 'FAISS',   desc: '暴力精确检索，作为准确度基线',
              btn: 'bg-gradient-to-br from-emerald-500 to-teal-600 border-emerald-400 text-white shadow-md shadow-emerald-500/25 hover:shadow-lg hover:shadow-emerald-500/35' },
            { type: 'ivf_flat', label: 'IVF-Flat', lib: 'FAISS',   desc: '倒排 + 原始向量，中等加速',
              btn: 'bg-gradient-to-br from-blue-500 to-indigo-600 border-blue-400 text-white shadow-md shadow-blue-500/25 hover:shadow-lg hover:shadow-blue-500/35' },
            { type: 'ivf_pq',   label: 'IVF-PQ',   lib: 'FAISS',   desc: '倒排 + 乘积量化，省内存',
              btn: 'bg-gradient-to-br from-violet-500 to-fuchsia-600 border-violet-400 text-white shadow-md shadow-violet-500/25 hover:shadow-lg hover:shadow-violet-500/35' },
        ];

        const TOP_K_OPTIONS = [5, 10, 20, 50];
        const BENCH_INDEX_ORDER = ['hnsw', 'ivf_flat', 'ivf_pq', 'exact'];
        const METRIC_OPTIONS = [
            { value: 'l2', label: 'L2', hint: '欧氏距离 · 默认 ANN 度量' },
            { value: 'cosine', label: 'Cosine', hint: 'L2 归一化 + 内积 · 方向相似度' },
        ];

        const EXPORT_FORMATS = [
            { id: 'pdf', label: 'PDF', highlight: true },
            { id: 'json', label: 'JSON' },
            { id: 'csv', label: 'CSV' },
            { id: 'md', label: 'Markdown' },
            { id: 'html', label: 'HTML' },
        ];

        const ExportMenu = ({ onExport, disabled, className = '' }) => (
            <div className={`flex flex-wrap items-center gap-1 ${className}`}>
                <span className="text-[9px] font-black uppercase text-slate-400 mr-1">导出</span>
                {EXPORT_FORMATS.map(f => (
                    <button key={f.id} type="button" disabled={disabled}
                        onClick={() => onExport(f.id)}
                        className={`px-2 py-1 rounded-lg text-[9px] font-black uppercase border disabled:opacity-40 ${
                            f.highlight
                                ? 'border-violet-300 bg-violet-50 text-violet-700 hover:bg-violet-100'
                                : 'border-slate-200 bg-white text-slate-600 hover:bg-blue-50 hover:border-blue-200 hover:text-blue-600'
                        }`}>
                        {f.label}
                    </button>
                ))}
            </div>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('search');
            const [showLogin, setShowLogin] = useState(false);
            const [showRegister, setShowRegister] = useState(false);
            const [adminUsers, setAdminUsers] = useState([]);
            
            // Data State
            const [datasets, setDatasets] = useState([]);
            const [indices, setIndices] = useState([]);
            const [selectedDsId, setSelectedDsId] = useState('');
            const [selectedIdxId, setSelectedIdxId] = useState('');
            
            // Filter Options Cache
            const [filterOptions, setFilterOptions] = useState({}); // { key: [val1, val2... ] }
            
            // Search State
            const [searchType, setSearchType] = useState('id'); 
            const [queryInput, setQueryInput] = useState('Cell_005');
            const [filters, setFilters] = useState({}); // 支持多重过滤
            const [filterKey, setFilterKey] = useState('cell_type');
            const [filterVal, setFilterVal] = useState('');
            const [searchResults, setSearchResults] = useState(null);
            const [searchLoading, setSearchLoading] = useState(false);
            const [resultView, setResultView] = useState('viz');
            const [vizTab, setVizTab] = useState('scatter');
            const [embedData, setEmbedData] = useState(null);
            const [compareOpen, setCompareOpen] = useState(false);
            const [compareLoading, setCompareLoading] = useState(false);
            const [compareData, setCompareData] = useState(null);
            const [compareHit, setCompareHit] = useState(null);
            const [indexCompareMode, setIndexCompareMode] = useState(false);
            const [compareIndexIds, setCompareIndexIds] = useState([]);
            const [compareResults, setCompareResults] = useState(null);
            
            // Upload State
            const [uploading, setUploading] = useState(false);

            // Eval State
            const [evalResult, setEvalResult] = useState(null);
            const [evalBatchResults, setEvalBatchResults] = useState(null);
            const [evalLoading, setEvalLoading] = useState(false);
            const [evalIdxId, setEvalIdxId] = useState('');

            // Joint index
            const [jointSearchMode, setJointSearchMode] = useState(false);
            const [selectedJointIdxId, setSelectedJointIdxId] = useState('');
            const [jointBuildDsIds, setJointBuildDsIds] = useState([]);
            const [jointBuildType, setJointBuildType] = useState('hnsw');
            const [buildMetric, setBuildMetric] = useState('l2');
            const [topK, setTopK] = useState(10);

            // AI Chat State
            const [chatDatasetId, setChatDatasetId] = useState('');
            const [chatHistory, setChatHistory] = useState([]);
            const [chatInput, setChatInput] = useState('');
            const [chatLoading, setChatLoading] = useState(false);
            const [chatResult, setChatResult] = useState(null);
            const chatEndRef = React.useRef(null);
            useEffect(() => {
                if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [chatHistory]);

            const [chatVizTab, setChatVizTab] = useState('scatter');
            const [chatUseJoint, setChatUseJoint] = useState(false);
            const [chatJointIdxId, setChatJointIdxId] = useState('');
            const [chatJointOptions, setChatJointOptions] = useState([]);

            const [enableBioExplain, setEnableBioExplain] = useState(false);
            const [searchBioExplain, setSearchBioExplain] = useState('');
            const [bioExplainLoading, setBioExplainLoading] = useState(false);

            const [autoRecommendParams, setAutoRecommendParams] = useState(false);
            const [buildParams, setBuildParams] = useState({ M: 16, ef_construction: 200, nlist: 100, nprobe: 10, m_pq: 8, nbits: 8 });
            const [paramRecommendHint, setParamRecommendHint] = useState('');

            const [paramSweepResults, setParamSweepResults] = useState(null);
            const [paramSweepLoading, setParamSweepLoading] = useState(false);

            useEffect(() => {
                if (!chatDatasetId || !chatUseJoint) {
                    setChatJointOptions([]);
                    return;
                }
                ScannAPI.getChatJointIndexes(Number(chatDatasetId)).then(list => {
                    const opts = Array.isArray(list) ? list : [];
                    setChatJointOptions(opts);
                    if (opts.length && !opts.some(o => String(o.id) === String(chatJointIdxId))) {
                        setChatJointIdxId(String(opts[0].id));
                    }
                }).catch(() => setChatJointOptions([]));
            }, [chatDatasetId, chatUseJoint]);

            // 切换 tab 或结果更新时渲染图表
            useEffect(() => {
                if (!chatResult || view !== 'ai_chat') return;
                const results = chatResult.results || [];
                const dsId = Number(chatDatasetId);

                // 延迟一帧，确保 canvas DOM 已挂载
                const tid = setTimeout(() => {
                    if (chatVizTab === 'scatter' && dsId) {
                        SearchViz.destroyAll('ai-chat-scatter');
                        SearchViz.fetchEmbedData(dsId).then(embed => {
                            SearchViz.renderScatter('ai-chat-scatter', embed, null, results, embed.source, null, null);
                        }).catch(err => console.warn('embed fetch:', err));
                    } else if (chatVizTab === 'meta') {
                        SearchViz.destroyAll('ai-chat-meta');
                        SearchViz.renderMetaProfile('ai-chat-meta', results);
                    }
                }, 50);
                return () => clearTimeout(tid);
            }, [chatResult, chatVizTab, view]);

            // Records (history + eval reports)
            const [recordsTab, setRecordsTab] = useState('history');
            const [queryHistory, setQueryHistory] = useState([]);
            const [evalReports, setEvalReports] = useState([]);
            const [recordsLoading, setRecordsLoading] = useState(false);
            const [recordsDsFilter, setRecordsDsFilter] = useState('');

            useEffect(() => {
                ScannAPI.getCurrentUser()
                    .then(u => setUser(u))
                    .catch(() => setUser({ username: '访客', role: 'visitor', is_guest: true }))
                    .finally(() => setLoading(false));
            }, []);

            useEffect(() => {
                if (!loading) loadAll();
            }, [loading]);

            useEffect(() => {
                const hasBuilding = indices.some(i => i.status === 'building');
                if (!hasBuilding) return;
                const timer = setInterval(loadAll, 2000);
                return () => clearInterval(timer);
            }, [indices]);

            const loadAll = async () => {
                try {
                    const [ds, idx] = await Promise.all([
                        ScannAPI.getDatasets(),
                        ScannAPI.getIndexes()
                    ]);
                    setDatasets(ds);
                    setIndices(idx);
                    if (ds.length > 0 && !selectedDsId) setSelectedDsId(ds[0].id);
                } catch (err) { console.error(err); }
            };

            const isGuest = !user || user.is_guest;
            const isLoggedIn = user && !user.is_guest;
            const isExpert = isLoggedIn && ['expert', 'labadmin', 'sysadmin'].includes(user.role);
            const isSysAdmin = isLoggedIn && user.role === 'sysadmin';
            const canManage = isLoggedIn && user.role !== 'visitor';

            const currentDataset = useMemo(() => 
                datasets.find(d => d.id === Number(selectedDsId)),
            [datasets, selectedDsId]);

            const jointIndices = useMemo(() =>
                indices.filter(i => i.params?.joint),
            [indices]);

            const readyJointIndices = useMemo(() =>
                jointIndices.filter(i => i.status === 'ready'),
            [jointIndices]);

            const currentIndices = useMemo(() => 
                indices.filter(i => i.dataset_id === Number(selectedDsId) && !i.params?.joint),
            [indices, selectedDsId]);

            const readyIndices = useMemo(() => 
                currentIndices.filter(i => i.status === 'ready'),
            [currentIndices]);

            const datasetNameById = (id) =>
                datasets.find(d => d.id === Number(id))?.name || `Dataset #${id}`;

            const formatDateTime = (iso) => {
                if (!iso) return '—';
                try {
                    return new Date(iso).toLocaleString('zh-CN', { hour12: false });
                } catch (e) {
                    return iso;
                }
            };

            const queryTypeLabel = (t) => ({
                cell_id: 'Cell ID', vector: 'Vector', random: '随机', id: 'Cell ID',
            }[t] || t || '—');

            const loadRecords = async () => {
                setRecordsLoading(true);
                try {
                    const params = { limit: 50 };
                    if (recordsDsFilter) params.dataset_id = Number(recordsDsFilter);
                    const history = await ScannAPI.getQueryHistory(params);
                    setQueryHistory(Array.isArray(history) ? history : []);
                    if (isExpert) {
                        const reports = await ScannAPI.listEvaluationReports(params);
                        setEvalReports(Array.isArray(reports) ? reports : []);
                    }
                } catch (e) {
                    console.error(e);
                    if (e?.error) alert(e.error);
                } finally {
                    setRecordsLoading(false);
                }
            };

            const loadEvalReportsOnly = async () => {
                if (!isExpert) return;
                try {
                    const params = { limit: 30 };
                    if (selectedDsId) params.dataset_id = Number(selectedDsId);
                    const reports = await ScannAPI.listEvaluationReports(params);
                    setEvalReports(Array.isArray(reports) ? reports : []);
                } catch (e) { console.error(e); }
            };

            useEffect(() => {
                if (view === 'records' && isLoggedIn) loadRecords();
            }, [view, recordsDsFilter, isLoggedIn, isExpert]);

            useEffect(() => {
                if (view === 'eval' && isExpert) loadEvalReportsOnly();
            }, [view, selectedDsId, isExpert]);

            const replayHistory = (item) => {
                setView('search');
                setJointSearchMode(false);
                setIndexCompareMode(false);
                setCompareResults(null);
                setSearchResults(null);
                setSelectedDsId(String(item.dataset_id));
                if (item.query_type === 'vector') {
                    setSearchType('vec');
                } else {
                    setSearchType('id');
                }
                setQueryInput(item.query_input || '');
                const idx = indices.find(i =>
                    i.dataset_id === item.dataset_id &&
                    i.index_type === item.index_type &&
                    i.status === 'ready' &&
                    !i.params?.joint
                );
                if (idx) setSelectedIdxId(idx.id);
                if (item.top_k) setTopK(Number(item.top_k));
            };

            const jointIndexLabel = (idx) => {
                const ids = idx.params?.dataset_ids || [];
                const names = ids.map(datasetNameById).join(' + ');
                const cells = idx.params?.total_cells ? ` · ${idx.params.total_cells} cells` : '';
                return `${idx.index_type.toUpperCase()} · ${names}${cells}`;
            };

            const jointFilterContext = useMemo(() => {
                if (!selectedJointIdxId) return null;
                const ji = indices.find(i => String(i.id) === String(selectedJointIdxId));
                if (!ji?.params?.dataset_ids) return null;
                const dsList = ji.params.dataset_ids
                    .map(id => datasets.find(d => d.id === Number(id)))
                    .filter(Boolean);
                const obsUnion = [...new Set(dsList.flatMap(d => d.obs_columns || []))];
                const mergedOptions = {};
                dsList.forEach(d => {
                    Object.entries(d.cell_type_distribution || {}).forEach(([k, vals]) => {
                        mergedOptions[k] = [...new Set([...(mergedOptions[k] || []), ...(vals || [])])];
                    });
                });
                return { obs_columns: obsUnion, filterOptions: mergedOptions, name: jointIndexLabel(ji) };
            }, [selectedJointIdxId, indices, datasets]);

            const activeFilterContext = jointSearchMode ? jointFilterContext : currentDataset;

            const benchmarkIndices = useMemo(() =>
                readyIndices.filter(i => i.index_type !== 'exact'),
            [readyIndices]);

            const hasExactBaseline = useMemo(() =>
                readyIndices.some(i => i.index_type === 'exact'),
            [readyIndices]);

            const selectedEvalIndex = useMemo(() =>
                benchmarkIndices.find(i => String(i.id) === String(evalIdxId)),
            [benchmarkIndices, evalIdxId]);

            const buildBenchmarkChartRows = (batchResults, singleResult) => {
                const byType = {};
                (batchResults || []).forEach(r => {
                    if (r?.index_type) byType[r.index_type] = r;
                });
                if (singleResult?.index_type && singleResult.index_type !== 'exact') {
                    byType[singleResult.index_type] = singleResult;
                }
                const exactMs = batchResults?.[0]?.avg_exact_time_ms
                    || singleResult?.avg_exact_time_ms
                    || byType.hnsw?.avg_exact_time_ms
                    || byType.ivf_flat?.avg_exact_time_ms
                    || byType.ivf_pq?.avg_exact_time_ms;
                const builtTypes = new Set(
                    readyIndices.filter(i => i.dataset_id === Number(selectedDsId)).map(i => i.index_type)
                );
                return BENCH_INDEX_ORDER.map(type => {
                    if (type === 'exact') {
                        return {
                            index_type: 'exact',
                            recall_at_k: 1,
                            speedup: 1,
                            avg_ann_time_ms: exactMs,
                            avg_exact_time_ms: exactMs,
                            index_size_mb: byType.hnsw?.exact_index_size_mb ?? singleResult?.exact_index_size_mb ?? null,
                            memory_ratio: 1,
                            index_size_label: byType.hnsw?.exact_index_size_label ?? singleResult?.exact_index_size_label ?? null,
                            present: builtTypes.has('exact') && !!exactMs,
                        };
                    }
                    const r = byType[type];
                    return {
                        index_type: type,
                        recall_at_k: r?.recall_at_k ?? null,
                        speedup: r?.speedup ?? null,
                        avg_ann_time_ms: r?.avg_ann_time_ms ?? null,
                        avg_exact_time_ms: r?.avg_exact_time_ms ?? exactMs,
                        index_size_mb: r?.index_size_mb ?? null,
                        memory_ratio: r?.memory_ratio ?? null,
                        index_size_label: r?.index_size_label ?? null,
                        present: !!r,
                    };
                });
            };

            const benchmarkChartRows = useMemo(() => {
                if (!evalBatchResults?.length && !evalResult) return null;
                return buildBenchmarkChartRows(evalBatchResults, evalResult);
            }, [evalBatchResults, evalResult, readyIndices, selectedDsId]);

            const benchmarkChartSubtitle = useMemo(() => {
                if (!benchmarkChartRows) return '';
                const tested = benchmarkChartRows.filter(r => r.present && r.index_type !== 'exact').length;
                const annBuilt = BENCH_INDEX_ORDER.filter(t => t !== 'exact' && readyIndices.some(
                    i => i.dataset_id === Number(selectedDsId) && i.index_type === t
                )).length;
                if (evalBatchResults?.length >= 3) {
                    return `已评测 ${tested} 种 ANN · Exact 为 Ground Truth 基线（Recall=100%, 1×）`;
                }
                if (evalResult && !evalBatchResults) {
                    return `当前仅单索引结果 · 点击「评测全部 ANN」补全四索引对比（已构建 ${annBuilt}/3 种 ANN）`;
                }
                return `Exact 基线 · 建议构建并评测 HNSW / IVF-Flat / IVF-PQ 三种 ANN`;
            }, [benchmarkChartRows, evalBatchResults, evalResult, readyIndices, selectedDsId]);

            useEffect(() => {
                if (view !== 'eval' || !benchmarkChartRows) {
                    BenchmarkViz.destroyAll();
                    return;
                }
                const dsName = datasets.find(d => String(d.id) === String(selectedDsId))?.name;
                const timer = requestAnimationFrame(() => {
                    BenchmarkViz.renderCombined('bench-compare-chart', benchmarkChartRows, {
                        topK,
                        datasetName: dsName,
                        subtitle: benchmarkChartSubtitle,
                    });
                });
                return () => {
                    cancelAnimationFrame(timer);
                    BenchmarkViz.destroyAll();
                };
            }, [view, benchmarkChartRows, topK, selectedDsId, datasets, benchmarkChartSubtitle]);

            useEffect(() => {
                if (readyIndices.length > 0) setSelectedIdxId(readyIndices[0].id);
                else setSelectedIdxId('');
                if (readyIndices.length > 0) {
                    setCompareIndexIds(readyIndices.map(i => String(i.id)));
                } else {
                    setCompareIndexIds([]);
                }
                
                // Reset filter key if not in current dataset columns
                if (currentDataset && !currentDataset.obs_columns.includes(filterKey)) {
                    setFilterKey(currentDataset.obs_columns[0] || '');
                }
                if (jointSearchMode && jointFilterContext?.obs_columns?.length) {
                    if (!jointFilterContext.obs_columns.includes(filterKey)) {
                        setFilterKey(jointFilterContext.obs_columns[0] || '');
                    }
                    setFilterOptions(jointFilterContext.filterOptions || {});
                } else if (selectedDsId) {
                    ScannAPI.getDatasetDetail(selectedDsId).then(data => {
                        // 假设后端详情接口返回了 cell_type_distribution，我们从中提取唯一值
                        // 或者动态从 UMAP 数据中提取（为了演示，这里使用 cache 或模拟获取）
                        setFilterOptions(data.cell_type_distribution || {});
                    });
                }
            }, [readyIndices, currentDataset, selectedDsId, jointSearchMode, jointFilterContext]);

            useEffect(() => {
                if (benchmarkIndices.length === 0) {
                    setEvalIdxId('');
                    return;
                }
                if (!benchmarkIndices.some(i => String(i.id) === String(evalIdxId))) {
                    setEvalIdxId(benchmarkIndices[0].id);
                }
            }, [benchmarkIndices, selectedDsId]);

            useEffect(() => {
                if (readyJointIndices.length === 0) {
                    setSelectedJointIdxId('');
                    return;
                }
                if (!readyJointIndices.some(i => String(i.id) === String(selectedJointIdxId))) {
                    setSelectedJointIdxId(readyJointIndices[0].id);
                }
            }, [readyJointIndices]);

            useEffect(() => {
                if (datasets.length >= 2 && jointBuildDsIds.length === 0) {
                    setJointBuildDsIds(datasets.slice(0, 2).map(d => String(d.id)));
                }
            }, [datasets]);

            const normalizeJointSearchResponse = (raw) => {
                const qin = raw.query_input || '';
                let queryCellId = 'Vector';
                if (raw.query_type === 'cell_id' || raw.query_type === 'random') {
                    queryCellId = qin.includes(':') ? qin.split(':').slice(1).join(':') : qin;
                }
                const metaKeys = new Set(['rank', 'dataset_id', 'cell_id', 'distance', 'similarity', 'cell_type', 'dataset_name']);
                return {
                    ...raw,
                    is_joint: true,
                    query_cell_id: queryCellId,
                    query_time_ms: raw.query_time_ms,
                    results: (raw.results || []).map(r => {
                        const metadata = {};
                        Object.entries(r).forEach(([k, v]) => {
                            if (!metaKeys.has(k)) metadata[k] = String(v);
                        });
                        return {
                            ...r,
                            similarity: 1.0 / (1.0 + Number(r.distance || 0)),
                            cell_type: r.cell_type,
                            metadata,
                            dataset_name: datasetNameById(r.dataset_id),
                        };
                    }),
                };
            };

            const collectSearchFilters = () => {
                const searchFilters = { ...filters };
                if (filterKey && filterVal) {
                    searchFilters[filterKey] = [filterVal];
                }
                return searchFilters;
            };

            const exportCurrentSearch = (format) => {
                if (!searchResults?.results?.length) return alert('暂无检索结果可导出');
                ScannExport.exportSearch({
                    results: searchResults.results,
                    queryInput: searchResults.query_cell_id || searchResults.query_input,
                    queryType: searchResults.query_type,
                    queryTimeMs: searchResults.query_time_ms || searchResults.time_ms,
                    isJoint: !!searchResults.is_joint,
                    datasetName: datasets.find(d => String(d.id) === String(selectedDsId))?.name,
                    bioExplain: enableBioExplain ? searchBioExplain : '',
                }, format);
            };

            const exportCurrentBenchmark = (format) => {
                ScannExport.exportBenchmark({
                    batchResults: evalBatchResults,
                    singleResult: evalResult,
                    datasetName: datasets.find(d => String(d.id) === String(selectedDsId))?.name,
                    datasetId: selectedDsId,
                    topK,
                    paramSweep: paramSweepResults,
                }, format);
            };

            const exportCellComparePdf = () => {
                if (!compareData) return alert('暂无对比数据');
                const dsId = compareHit?.dataset_id || selectedDsId;
                ScannPdf.exportCellCompare({
                    compareData,
                    datasetId: dsId,
                    datasetName: datasets.find(d => String(d.id) === String(dsId))?.name,
                    queryCellId: resolveQueryCellId?.(),
                    targetCellId: compareHit?.cell_id,
                    rank: compareHit?.rank,
                    searchSimilarity: compareHit?.similarity,
                    searchDistance: compareHit?.distance,
                });
            };

            const exportHistoryRecords = (format) => {
                ScannExport.exportQueryHistory(queryHistory, format, {
                    记录数: queryHistory.length,
                    筛选数据集: recordsDsFilter ? datasetNameById(recordsDsFilter) : '全部',
                });
            };

            const exportEvalRecords = (format) => {
                ScannExport.exportEvalReports(evalReports, format, {
                    报告数: evalReports.length,
                    筛选数据集: recordsDsFilter ? datasetNameById(recordsDsFilter) : '全部',
                });
            };

            const runJointSearch = async (query_type, query_input) => {
                if (!selectedJointIdxId) throw { error: '请先在「数据与索引」构建联合索引，或选择 ready 的联合索引' };
                const body = { query_type, top_k: Number(topK), filters: collectSearchFilters() };
                if (query_input !== undefined && query_input !== null) body.query_input = query_input;
                const raw = await ScannAPI.searchJointIndex(Number(selectedJointIdxId), body);
                return normalizeJointSearchResponse(raw);
            };

            const toggleJointBuildDs = (id) => {
                const sid = String(id);
                setJointBuildDsIds(prev =>
                    prev.includes(sid) ? prev.filter(x => x !== sid) : [...prev, sid]
                );
            };

            const buildJointIdx = async () => {
                if (jointBuildDsIds.length < 2) return alert('联合索引至少需要选择 2 个数据集');
                try {
                    let params = {};
                    const firstDsId = Number(jointBuildDsIds[0]);
                    if (autoRecommendParams) {
                        const totalCells = jointBuildDsIds.reduce((sum, id) => {
                            const ds = datasets.find(d => String(d.id) === String(id));
                            return sum + (ds?.n_cells || 0);
                        }, 0);
                        const rec = await ScannAPI.getRecommendParams(firstDsId, jointBuildType, totalCells);
                        params = rec.params || {};
                        setParamRecommendHint(rec.summary || '');
                    } else if (jointBuildType !== 'exact') {
                        if (jointBuildType === 'hnsw') {
                            params = { M: Number(buildParams.M), ef_construction: Number(buildParams.ef_construction) };
                        } else if (jointBuildType === 'ivf_flat') {
                            params = { nlist: Number(buildParams.nlist) };
                        } else if (jointBuildType === 'ivf_pq') {
                            params = { nlist: Number(buildParams.nlist), m_pq: Number(buildParams.m_pq), nbits: Number(buildParams.nbits) };
                        }
                    }
                    await ScannAPI.buildJointIndex({
                        dataset_ids: jointBuildDsIds.map(Number),
                        index_type: jointBuildType,
                        metric: buildMetric,
                        params,
                    });
                    alert('联合索引构建任务已提交，请稍候刷新状态');
                    loadAll();
                } catch (e) { alert(e.error || '联合索引构建失败'); }
            };

            const deleteJointIdx = async (idxId) => {
                if (!confirm('确定删除该联合索引？')) return;
                try {
                    await ScannAPI.deleteIndex(idxId);
                    loadAll();
                } catch (e) { alert(e.error || '删除失败'); }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                try {
                    const res = await ScannAPI.login(e.target.username.value, e.target.password.value);
                    setUser(res.user);
                    setShowLogin(false);
                    loadAll();
                } catch (err) { alert(err.error || "登录失败"); }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                try {
                    await ScannAPI.register({
                        username: e.target.username.value,
                        email: e.target.email.value,
                        password: e.target.password.value,
                    });
                    alert('注册成功，请登录');
                    setShowRegister(false);
                    setShowLogin(true);
                } catch (err) { alert(err.error || "注册失败"); }
            };

            const handleLogout = async () => {
                try {
                    const res = await ScannAPI.logout();
                    setUser(res.user);
                    setView('search');
                    loadAll();
                } catch (err) { alert(err.error || "退出失败"); }
            };

            const loadAdminUsers = async () => {
                try {
                    setAdminUsers(await ScannAPI.getUsers());
                } catch (e) { alert(e.error || '加载用户失败'); }
            };

            useEffect(() => {
                if (view === 'users' && isSysAdmin) loadAdminUsers();
            }, [view, isSysAdmin]);

            useEffect(() => {
                if (!searchResults?.results?.length) {
                    setEmbedData(null);
                    SearchViz.destroyAll('sviz-');
                    return;
                }
                let cancelled = false;
                if (searchResults.is_joint) {
                    const jointIdx = indices.find(i => String(i.id) === String(selectedJointIdxId));
                    const dsIds = searchResults.dataset_ids
                        || jointIdx?.params?.dataset_ids
                        || [...new Set(searchResults.results.map(r => r.dataset_id))];
                    SearchViz.fetchJointEmbedData(dsIds).then((data) => {
                        if (cancelled) return;
                        setEmbedData({
                            ...data,
                            datasets: (data.datasets || []).map(d => ({
                                ...d,
                                name: datasetNameById(d.dataset_id),
                            })),
                        });
                    }).catch(() => { if (!cancelled) setEmbedData(null); });
                } else if (selectedDsId) {
                    SearchViz.fetchEmbedData(Number(selectedDsId)).then((data) => {
                        if (!cancelled) setEmbedData(data);
                    }).catch(() => { if (!cancelled) setEmbedData(null); });
                } else {
                    setEmbedData(null);
                }
                return () => { cancelled = true; };
            }, [searchResults, selectedDsId, selectedJointIdxId, indices, datasets]);

            useEffect(() => {
                if (!searchResults?.results?.length || resultView !== 'viz') return;
                const qid = searchResults.query_cell_id;
                const fallbackQ = searchType === 'id' ? queryInput.trim() : null;
                const res = searchResults.results;
                requestAnimationFrame(() => {
                    SearchViz.destroyAll('sviz-');
                    if (vizTab === 'scatter' && embedData) {
                        if (searchResults.is_joint) {
                            SearchViz.renderJointScatter(
                                'sviz-scatter', embedData, qid, res,
                                searchResults.query_input, fallbackQ,
                                (hit) => openCellCompare(hit),
                            );
                        } else {
                            SearchViz.renderScatter('sviz-scatter', embedData, qid, res, embedData.source, fallbackQ,
                                (cellId) => {
                                    const hit = res.find((r) => r.cell_id === cellId);
                                    if (hit) openCellCompare(hit);
                                });
                        }
                    } else if (vizTab === 'similarity') {
                        SearchViz.renderSimilarityBars('sviz-similarity', res);
                    } else if (vizTab === 'celltype') {
                        SearchViz.renderCellTypeBars('sviz-celltype', res);
                    } else if (vizTab === 'distance') {
                        SearchViz.renderDistanceBars('sviz-distance', res);
                    }
                });
            }, [searchResults, embedData, vizTab, resultView, searchType, queryInput]);

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const formData = new FormData();
                formData.append('file', file);
                setUploading(true);
                try {
                    const res = await ScannAPI.uploadDataset(formData);
                    const v = res.vectorization || res.dataset?.vectorization;
                    if (res.pca_computed && v) {
                        alert(`${res.message || '上传成功'}\n\n向量化：${v.pipeline}\n执行方：${v.computed_by || 'Scann'}`);
                    } else if (v) {
                        alert(`${res.message || '上传成功'}\n\n使用文件内预置 X_pca（${v.n_components} 维）`);
                    } else {
                        alert(res.message || '上传成功！');
                    }
                    loadAll();
                } catch (e) { alert(e.error || "上传失败"); }
                finally { setUploading(false); e.target.value = ''; }
            };

            const vectorizationLabel = (ds) => {
                const v = ds?.vectorization;
                if (!v) return `${ds?.n_dims || '?'}D PCA`;
                if (v.source === 'auto_pca') {
                    return `系统自动 PCA · ${v.n_components}D`;
                }
                return `文件预置 X_pca · ${v.n_components || ds.n_dims}D`;
            };

            const runSearch = async () => {
                if (jointSearchMode) {
                    if (!selectedJointIdxId) return alert('请先构建并选择联合索引');
                    setSearchLoading(true);
                    setSearchResults(null);
                    setCompareResults(null);
                    setResultView('viz');
                    try {
                        let res;
                        if (searchType === 'id') {
                            res = await runJointSearch('cell_id', queryInput.trim());
                        } else {
                            let vec;
                            try { vec = JSON.parse(queryInput); } catch(e) { throw {error: "向量格式不正确，请输入 JSON 数组如 [0.1, 0.2, ...]"}; }
                            res = await runJointSearch('vector', vec);
                        }
                        setSearchResults(res);
                    } catch (e) { alert(e.error || "联合检索失败"); }
                    finally { setSearchLoading(false); }
                    return;
                }
                if (indexCompareMode) {
                    try {
                        await runIndexCompare();
                    } catch (e) {
                        if (e?.error) alert(e.error);
                    }
                    return;
                }
                if (!selectedIdxId) return alert("请先构建索引");
                setSearchLoading(true);
                setSearchResults(null);
                setCompareResults(null);
                
                // 使用已存储的多重过滤器，如果当前下拉框也有选择值则临时加入
                const searchFilters = collectSearchFilters();

                try {
                    let res;
                    if (searchType === 'id') {
                        res = await ScannAPI.searchByCell({
                            dataset_id: Number(selectedDsId),
                            index_id: Number(selectedIdxId),
                            cell_id: queryInput,
                            top_k: Number(topK),
                            filters: searchFilters
                        });
                    } else {
                        let vec;
                        try { vec = JSON.parse(queryInput); } catch(e) { throw {error: "向量格式不正确，请输入 JSON 数组如 [0.1, 0.2, ...]"}; }
                        res = await ScannAPI.searchByVector({
                            dataset_id: Number(selectedDsId),
                            index_id: Number(selectedIdxId),
                            vector: vec,
                            top_k: Number(topK),
                            filters: searchFilters
                        });
                    }
                    setSearchResults(res);
                } catch (e) { alert(e.error || "检索失败"); }
                finally { setSearchLoading(false); }
            };

            const runRandom = async () => {
                if (jointSearchMode) {
                    if (!selectedJointIdxId) return alert('请先构建并选择联合索引');
                    setSearchLoading(true);
                    setSearchResults(null);
                    setCompareResults(null);
                    setResultView('viz');
                    try {
                        const res = await runJointSearch('random');
                        if (!res?.query_cell_id) throw { error: '随机测试未返回有效 Cell ID' };
                        setQueryInput(res.query_cell_id);
                        setSearchType('id');
                        setSearchResults(res);
                    } catch (e) { alert(e.error || "随机查找失败"); }
                    finally { setSearchLoading(false); }
                    return;
                }
                if (!selectedIdxId && !indexCompareMode) return;
                setSearchLoading(true);
                setSearchResults(null);
                setCompareResults(null);
                try {
                    const pickIdxId = indexCompareMode
                        ? (compareIndexIds[0] || readyIndices[0]?.id)
                        : selectedIdxId;
                    if (!pickIdxId) throw { error: '无可用索引，请先构建索引' };

                    const res = await ScannAPI.searchRandom({
                        dataset_id: Number(selectedDsId),
                        index_id: Number(pickIdxId),
                        top_k: Number(topK),
                    });

                    if (!res?.query_cell_id) throw { error: '随机测试未返回有效 Cell ID' };

                    setQueryInput(res.query_cell_id);
                    setSearchType('id');

                    if (indexCompareMode) {
                        await runIndexCompare(res.query_cell_id);
                        return;
                    }

                    setSearchResults(res);
                } catch (e) { alert(e.error || "随机查找失败"); }
                finally { setSearchLoading(false); }
            };

            const runIndexCompare = async (overrideCellId) => {
                const ids = compareIndexIds.length >= 2 ? compareIndexIds : readyIndices.map(i => String(i.id));
                if (ids.length < 2) {
                    throw { error: '索引对比需要至少 2 个 ready 索引，请先在「数据与索引」中构建多种类型' };
                }
                setSearchLoading(true);
                setCompareResults(null);
                setSearchResults(null);
                const searchFilters = { ...filters };
                if (filterKey && filterVal) searchFilters[filterKey] = [filterVal];
                const cellId = overrideCellId || (searchType === 'id' ? String(queryInput).trim() : null);
                try {
                    const runs = await Promise.all(ids.map(async (idxId) => {
                        const idx = indices.find(i => String(i.id) === String(idxId));
                        let res;
                        if (cellId) {
                            res = await ScannAPI.searchByCell({
                                dataset_id: Number(selectedDsId), index_id: Number(idxId),
                                cell_id: cellId, top_k: Number(topK), filters: searchFilters,
                            });
                        } else if (searchType === 'vec') {
                            const vec = JSON.parse(queryInput);
                            res = await ScannAPI.searchByVector({
                                dataset_id: Number(selectedDsId), index_id: Number(idxId),
                                vector: vec, top_k: Number(topK), filters: searchFilters,
                            });
                        } else {
                            throw { error: '对比模式请使用 Cell ID 或 Vector 检索' };
                        }
                        return {
                            index_id: Number(idxId),
                            index_type: idx?.index_type || '?',
                            metric: idx?.metric || 'l2',
                            query_time_ms: res.query_time_ms || res.time_ms,
                            top_ids: (res.results || []).map(r => r.cell_id),
                            results: res.results || [],
                        };
                    }));
                    const baseline = runs.find(r => r.index_type === 'exact') || runs[0];
                    const enriched = runs.map(r => ({
                        ...r,
                        overlap_with_baseline: r.top_ids.filter(id => baseline.top_ids.includes(id)).length,
                        overlap_pct: baseline.top_ids.length
                            ? Math.round(100 * r.top_ids.filter(id => baseline.top_ids.includes(id)).length / baseline.top_ids.length)
                            : 0,
                    }));
                    setCompareResults({ runs: enriched, baseline_type: baseline.index_type, query: cellId || 'Vector', top_k: Number(topK) });
                } catch (e) {
                    throw (e && e.error) ? e : { error: '索引对比失败' };
                }
                finally { setSearchLoading(false); }
            };

            const toggleCompareIndex = (id) => {
                const sid = String(id);
                setCompareIndexIds(prev =>
                    prev.includes(sid) ? prev.filter(x => x !== sid) : [...prev, sid]
                );
            };

            const runEval = async () => {
                if (!evalIdxId) return alert('请先选择要评测的 ANN 索引');
                if (!hasExactBaseline) return alert('需要 Exact 索引作为基线，请先在「数据与索引」中构建 Exact');
                setEvalLoading(true);
                setEvalBatchResults(null);
                try {
                    const res = await ScannAPI.runEvaluation(selectedDsId, { index_id: Number(evalIdxId), k: Number(topK) });
                    setEvalResult(res);
                    loadEvalReportsOnly();
                } catch (e) { alert(e.error || "评测失败"); }
                finally { setEvalLoading(false); }
            };

            const runEvalBatch = async () => {
                if (benchmarkIndices.length === 0) return alert('没有可评测的 ANN 索引');
                if (!hasExactBaseline) return alert('需要 Exact 索引作为基线，请先在「数据与索引」中构建 Exact');
                setEvalLoading(true);
                setEvalResult(null);
                try {
                    const res = await ScannAPI.runBatchEvaluation(selectedDsId, { k: Number(topK) });
                    setEvalBatchResults(res.results || []);
                    if (res.results?.length) setEvalResult(res.results[0]);
                    loadEvalReportsOnly();
                } catch (e) { alert(e.error || "批量评测失败"); }
                finally { setEvalLoading(false); }
            };

            const buildIdx = async (dsId, type, metric = buildMetric) => {
                try {
                    let params = {};
                    if (autoRecommendParams) {
                        const rec = await ScannAPI.getRecommendParams(dsId, type);
                        params = rec.params || {};
                        setParamRecommendHint(rec.summary || '');
                        setBuildParams(prev => ({ ...prev, ...params }));
                    } else if (type !== 'exact') {
                        if (type === 'hnsw') {
                            params = { M: Number(buildParams.M), ef_construction: Number(buildParams.ef_construction) };
                        } else if (type === 'ivf_flat') {
                            params = { nlist: Number(buildParams.nlist) };
                        } else if (type === 'ivf_pq') {
                            params = { nlist: Number(buildParams.nlist), m_pq: Number(buildParams.m_pq), nbits: Number(buildParams.nbits) };
                        }
                    }
                    await ScannAPI.buildIndex({ dataset_id: dsId, index_type: type, metric, params });
                    alert(`${type.toUpperCase()} / ${metric.toUpperCase()} 构建任务已提交`);
                    loadAll();
                } catch (e) { alert(e.error || "提交失败"); }
            };

            const fetchBioExplain = async () => {
                if (!searchResults?.results?.length) return;
                setBioExplainLoading(true);
                setSearchBioExplain('');
                try {
                    const res = await ScannAPI.explainSearch({
                        enabled: true,
                        results: searchResults.results,
                        query_input: searchResults.query_cell_id || searchResults.query_input || queryInput,
                        query_type: searchType === 'id' ? 'cell_id' : 'vector',
                        is_joint: !!searchResults.is_joint,
                        filters: searchResults.filters || filters,
                    });
                    setSearchBioExplain(res.explanation || '');
                } catch (e) {
                    alert(e.error || '生物学解释生成失败');
                } finally {
                    setBioExplainLoading(false);
                }
            };

            const runParamSweep = async () => {
                if (!evalIdxId) return alert('请先选择 ANN 索引');
                if (!hasExactBaseline) return alert('需要 Exact 基线');
                setParamSweepLoading(true);
                setParamSweepResults(null);
                try {
                    const res = await ScannAPI.runParamSweep(selectedDsId, { index_id: Number(evalIdxId), k: Number(topK) });
                    setParamSweepResults(res);
                } catch (e) { alert(e.error || '参数扫描失败'); }
                finally { setParamSweepLoading(false); }
            };

            useEffect(() => {
                if (view !== 'eval' || !paramSweepResults?.results?.length) return;
                const timer = requestAnimationFrame(() => {
                    BenchmarkViz.renderParamSweep('bench-param-sweep-chart', paramSweepResults.results, {
                        paramName: paramSweepResults.param_name,
                        indexType: paramSweepResults.index_type,
                    });
                });
                return () => cancelAnimationFrame(timer);
            }, [view, paramSweepResults]);

            const deleteDataset = async (dsId, dsName) => {
                if (!confirm(`确定删除数据集「${dsName}」及其所有索引？此操作不可撤销。`)) return;
                try {
                    await ScannAPI.deleteDataset(dsId);
                    if (String(selectedDsId) === String(dsId)) setSelectedDsId('');
                    loadAll();
                } catch (e) { alert(e.error || '删除数据集失败'); }
            };

            const deleteIndex = async (idxId) => {
                if (!confirm('确定删除该索引？')) return;
                try {
                    await ScannAPI.deleteIndex(idxId);
                    loadAll();
                } catch (e) { alert(e.error || '删除索引失败'); }
            };

            const resolveQueryCellId = () => {
                if (searchType === 'id' && queryInput.trim()) return queryInput.trim();
                const q = searchResults?.query_cell_id;
                return q && q !== 'Vector' ? q : null;
            };

            const renderCompareCharts = (data) => {
                CellCompare.destroyAll();
                CellCompare.renderVectorBars('cmp-vector', data.vector_dims, data.has_query);
                if (data.has_query) CellCompare.renderDeltaBars('cmp-delta', data.vector_dims);
                CellCompare.renderPairMap('cmp-map', {
                    query: data.embed_2d?.query,
                    target: data.embed_2d?.target,
                    query_label: data.query?.cell_id,
                    target_label: data.target?.cell_id,
                }, data.has_query, embedData?.source || 'PCA');
            };

            const openCellCompare = async (hitResult) => {
                const dsId = hitResult?.dataset_id || selectedDsId;
                if (!hitResult || !dsId) return;
                setCompareHit(hitResult);
                setCompareOpen(true);
                setCompareLoading(true);
                setCompareData(null);
                try {
                    const data = await ScannAPI.compareCells(Number(dsId), {
                        query_cell_id: resolveQueryCellId(),
                        target_cell_id: hitResult.cell_id,
                        search_distance: hitResult.distance,
                        search_similarity: hitResult.similarity,
                    });
                    setCompareData(data);
                    setTimeout(() => renderCompareCharts(data), 80);
                } catch (e) {
                    alert(e.error || '加载对比详情失败');
                    setCompareOpen(false);
                } finally {
                    setCompareLoading(false);
                }
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-black italic text-blue-600">SCANN LOADING...</div>;

            return (
                <div className="min-h-screen flex text-slate-800">
                    {/* Sidebar */}
                    <aside className="w-72 bg-white border-r fixed h-full p-8 flex flex-col z-20">
                        <div className="flex items-center gap-2 mb-12">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black italic">S</div>
                            <span className="text-xl font-black italic tracking-tighter">SCANN <span className="text-blue-600">PRO</span></span>
                        </div>
                        
                        <nav className="flex-1 space-y-2 text-sm font-bold">
                            <button onClick={()=>setView('search')} className={`w-full flex items-center gap-3 p-4 rounded-2xl transition-all ${view==='search'?'bg-blue-50 text-blue-600':'text-slate-400 hover:bg-slate-50'}`}>
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                <span>检索工作平台</span>
                            </button>

                                                            : compareHit ? `${(compareHit.similarity * 100).toFixed(2)}%` : '—'}
                                                    </p>
                                                </div>
                                                <div className="p-5 bg-blue-50 rounded-2xl border border-blue-100">
                                                    <p className="text-[10px] font-black text-blue-400 uppercase">L2 距离</p>
                                                    <p className="text-3xl font-black text-blue-600">
                                                        {compareData.metrics.distance != null
                                                            ? compareData.metrics.distance.toFixed(4)
                                                            : compareHit?.distance?.toFixed(4) ?? '—'}
                                                    </p>
                                                </div>
                                                <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100">
                                                    <p className="text-[10px] font-black text-slate-400 uppercase">向量维度</p>
                                                    <p className="text-3xl font-black text-slate-700">{compareData.metrics.n_dims_total}D</p>
                                                </div>
                                            </div>

                                            {compareData.has_query && compareData.metadata_rows?.length > 0 && (
                                                <div>
                                                    <h3 className="text-sm font-black uppercase text-slate-400 mb-3 tracking-widest">元数据对比</h3>
                                                    <div className="overflow-hidden rounded-2xl border border-slate-100">
                                                        <table className="w-full text-sm">
                                                            <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                                                                <tr>
                                                                    <th className="text-left p-3">字段</th>
                                                                    <th className="text-left p-3">查询细胞</th>
                                                                    <th className="text-left p-3">命中细胞</th>
                                                                    <th className="text-center p-3">一致</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {compareData.metadata_rows.map(row => (
                                                                    <tr key={row.field} className={`border-t border-slate-50 ${row.match ? '' : 'bg-amber-50/50'}`}>
                                                                        <td className="p-3 font-bold text-slate-600">{row.field}</td>
                                                                        <td className="p-3 text-red-600 font-medium">{String(row.query_value ?? '—')}</td>
                                                                        <td className="p-3 text-blue-600 font-medium">{String(row.target_value ?? '—')}</td>
                                                                        <td className="p-3 text-center">{row.match ? '✓' : '≠'}</td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            )}

                                            {!compareData.has_query && (
                                                <div className="p-4 bg-amber-50 rounded-xl text-xs text-amber-800 font-medium">
                                                    当前为向量检索模式，无单一查询细胞。下方展示命中细胞 <strong>{compareData.target?.cell_id}</strong> 的向量与元数据详情。
                                                </div>
                                            )}

                                            {!compareData.has_query && compareData.target?.metadata && (
                                                <div className="flex flex-wrap gap-2">
                                                    {Object.entries(compareData.target.metadata).map(([k,v]) => (
                                                        <span key={k} className="px-3 py-1 bg-slate-50 border rounded-lg text-xs font-bold text-slate-600">
                                                            <span className="text-slate-400 uppercase mr-1">{k}:</span>{String(v)}
                                                        </span>
                                                    ))}
                                                </div>
                                            )}

                                            <div className="grid grid-cols-2 gap-6">
                                                <div className="h-64"><canvas id="cmp-map"></canvas></div>
                                                <div className="h-64"><canvas id="cmp-vector"></canvas></div>
                                            </div>
                                            {compareData.has_query && (
                                                <div className="h-56"><canvas id="cmp-delta"></canvas></div>
                                            )}
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {(showLogin || showRegister) && (
                        <div className="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-50 flex items-center justify-center p-6" onClick={()=>{setShowLogin(false); setShowRegister(false);}}>
                            <div className="bg-white p-10 rounded-[2rem] w-full max-w-md shadow-2xl" onClick={e=>e.stopPropagation()}>
                                <div className="text-center mb-8">
                                    <h1 className="text-3xl font-black italic text-slate-900 leading-none">SCANN<span className="text-blue-600">.</span></h1>
                                    <p className="text-slate-400 font-bold text-sm mt-2">{showRegister ? '创建新账号' : '登录以使用完整功能'}</p>
                                </div>
                                {showLogin ? (
                                    <form onSubmit={handleLogin} className="space-y-4">
                                        <input name="username" placeholder="用户名" defaultValue="normal" className="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none focus:ring-2 ring-blue-500 outline-none" />
                                        <input name="password" type="password" placeholder="密码" defaultValue="pass123" className="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none focus:ring-2 ring-blue-500 outline-none" />
                                        <button className="w-full py-4 btn-primary rounded-2xl font-black text-lg">登录</button>
                                        <p className="text-center text-xs text-slate-400">还没有账号？ <button type="button" className="text-blue-600 font-bold" onClick={()=>{setShowLogin(false); setShowRegister(true);}}>立即注册</button></p>
                                    </form>
                                ) : (
                                    <form onSubmit={handleRegister} className="space-y-4">
                                        <input name="username" placeholder="用户名" required className="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none focus:ring-2 ring-blue-500 outline-none" />
                                        <input name="email" type="email" placeholder="邮箱" required className="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none focus:ring-2 ring-blue-500 outline-none" />
                                        <input name="password" type="password" placeholder="密码" required className="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none focus:ring-2 ring-blue-500 outline-none" />
                                        <button className="w-full py-4 btn-primary rounded-2xl font-black text-lg">注册</button>
                                        <p className="text-center text-xs text-slate-400">已有账号？ <button type="button" className="text-blue-600 font-bold" onClick={()=>{setShowRegister(false); setShowLogin(true);}}>去登录</button></p>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
